name: Build Linux
on:
  push:
    branches: [ "master" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉代码
      - uses: actions/checkout@v4

      # 2. 装.NET环境
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 3. 直接编译 Linux x64 单文件（无版本，最简）
      - name: Compile Linux x64
        run: dotnet publish CtYun/CtYun.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./release

      # 4. 直接打包
      - name: Package
        run: tar -zcvf CtYun-Linux.tar.gz release/

      # 5. 上传下载
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CtYun-Linux
          path: CtYun-Linux.tar.gz
